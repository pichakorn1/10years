<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UW Event Checklist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#FFFFFF;--surface:#F7F3EC;--surface2:#E6E0D6;--border:#D8D0C4;--accent:#EE202E;--accent2:#6E7A89;--text:#434345;--text-muted:#6B6B6B;--text-dim:#8A8D93;--green:#2E7D52;--blue:#6E7A89;--red:#9A1220;--orange:#B85C00;--purple:#5C5FA0;--maroon:#9A1220;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-mark{width:32px;height:32px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:12px;color:#FFFFFF;}
.app-title{font-size:15px;font-weight:600;margin-left:10px;}
.app-sub{font-size:11px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;margin-left:10px;}
.header-left{display:flex;align-items:center;}
.header-tabs{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);padding:3px;border-radius:4px;}
.tab-btn{padding:6px 16px;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:500;border-radius:3px;transition:all .15s;background:transparent;color:var(--text-muted);}
.tab-btn.active{background:var(--accent);color:#FFFFFF;}
.tab-btn:not(.active):hover{color:var(--text);background:var(--surface2);}
.btn-add{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent);color:var(--bg);border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;border-radius:3px;transition:background .15s;}
.btn-add:hover{background:#c9101c;}
.view{display:none;}.view.active{display:block;}
.checklist-container{padding:24px;max-width:1200px;}
.stats-bar{display:flex;gap:12px;margin-bottom:20px;}
.stat-item{background:var(--surface);border:1px solid var(--border);padding:12px 16px;border-radius:4px;flex:1;}
.stat-num{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px;}
.s-total .stat-num{color:var(--accent);}.s-done .stat-num{color:var(--green);}.s-prog .stat-num{color:var(--blue);}.s-todo .stat-num{color:var(--text-muted);}.s-over .stat-num{color:var(--red);}
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.filter-label{font-size:12px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}
select.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 10px;font-family:'Sarabun',sans-serif;font-size:12px;border-radius:3px;cursor:pointer;}
select.filter-select:focus{outline:none;border-color:var(--accent);}
.phase-group{margin-bottom:6px;}
.phase-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;user-select:none;transition:border-color .15s;}
.phase-header:hover{border-color:var(--accent);}
.phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.phase-name{font-weight:600;font-size:13px;flex:1;}
.phase-count{font-size:11px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;background:var(--surface2);padding:2px 8px;border-radius:10px;}
.phase-chevron{color:var(--text-muted);font-size:10px;transition:transform .2s;}
.phase-chevron.open{transform:rotate(90deg);}
.task-list{border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;overflow:hidden;}
.task-header-row{display:grid;grid-template-columns:36px 1fr 130px 100px 130px 90px 90px 32px 32px;padding:0 8px;min-height:32px;align-items:center;background:var(--bg);border-bottom:1px solid var(--border);}
.th{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}
.task-row{display:grid;grid-template-columns:36px 1fr 130px 100px 130px 90px 90px 32px 32px;align-items:center;padding:0 8px;border-bottom:1px solid var(--border);min-height:44px;cursor:pointer;transition:background .1s;background:var(--surface);}
.task-row:last-child{border-bottom:none;}
.task-row:hover{background:var(--surface2);}
.task-row .btn-trash{opacity:0;transition:opacity .15s,color .15s;}
.task-row:hover .btn-trash{opacity:1;}
.btn-trash{background:none;border:none;cursor:pointer;font-size:13px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .15s;color:var(--text-dim);}
.btn-trash:hover{background:rgba(154,18,32,.08);color:var(--red);}
.task-cb{display:flex;align-items:center;justify-content:center;}
input[type="checkbox"]{width:14px;height:14px;cursor:pointer;accent-color:var(--green);}
.task-name-cell{display:flex;flex-direction:column;gap:2px;padding:8px 6px;}
.task-title{font-size:13px;font-weight:500;}.task-title.done{text-decoration:line-through;color:var(--text-muted);}
.task-detail-hint{font-size:11px;color:var(--text-dim);}
.task-phase-badge{font-size:10px;padding:2px 8px;border-radius:2px;font-weight:600;display:inline-flex;align-items:center;width:fit-content;}
.task-owner{font-size:12px;color:var(--text-muted);}
.task-dates{font-size:11px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}
.status-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:2px;display:inline-block;}
.status-done{background:rgba(46,125,82,.12);color:var(--green);}
.status-progress{background:rgba(110,122,137,.12);color:var(--blue);}
.status-todo{background:rgba(138,141,147,.12);color:var(--text-muted);}
.status-overdue{background:rgba(154,18,32,.1);color:var(--red);}
.progress-cell{display:flex;align-items:center;gap:6px;}
.progress-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;}
.progress-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s;}
.progress-pct{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;width:26px;}
.btn-edit{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:14px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .15s;}
.btn-edit:hover{background:var(--surface2);color:var(--accent);}
/* GANTT */
/* gantt-sticky-hdr sits OUTSIDE the overflow-x container — this is the only way
   position:sticky works vertically while the body scrolls horizontally */
.gantt-sticky-hdr{
  position:sticky;top:65px;z-index:20;
  display:flex;background:var(--surface);
  border-bottom:2px solid var(--border);
  border-top:1px solid var(--border);
  overflow:hidden;   /* hide the timeline overflow — JS syncs scroll */
}
.gantt-sticky-label{
  width:280px;min-width:280px;flex-shrink:0;
  padding:6px 14px 4px;font-size:11px;color:var(--text-muted);
  font-family:'IBM Plex Mono',monospace;
  border-right:1px solid var(--border);
  display:flex;align-items:flex-end;
}
.gantt-sticky-timeline{
  flex:1;overflow:hidden;pointer-events:none;
}
.gantt-month-row{white-space:nowrap;display:flex;}
.gantt-month-block{display:inline-flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border);}
.gantt-month-lbl{display:block;padding:3px 8px;font-size:11px;font-weight:600;color:var(--accent);border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.gantt-days-row{display:flex;}
.gantt-day-cell{width:28px;flex-shrink:0;font-size:9px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;text-align:center;padding:3px 0;border-right:1px solid rgba(216,208,196,.5);}
.gantt-day-cell.today-col{color:var(--accent);font-weight:700;border-right:1px solid rgba(238,32,46,.4);}
.gantt-day-cell.weekend{background:rgba(230,224,214,.35);}
/* Scrollable body — overflow-x here, NOT on the sticky header parent */
.gantt-outer{overflow-x:auto;overflow-y:visible;padding:0 0 24px 0;}
/* Scrollable body table */
.gantt-table{display:table;border-collapse:collapse;width:100%;}
/* Phase section row */
.gantt-phase-row{display:table-row;}
.gantt-phase-cell-label{display:table-cell;width:280px;min-width:280px;padding:6px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-family:'IBM Plex Mono',monospace;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg);vertical-align:middle;}
.gantt-phase-cell-bar{display:table-cell;border-bottom:1px solid var(--border);background:var(--bg);vertical-align:middle;padding:0;}
/* Task row */
.gantt-task-row{display:table-row;}
.gantt-task-row:hover .gantt-task-cell-label,.gantt-task-row:hover .gantt-task-cell-bar{background:rgba(247,243,236,.9)!important;}
.gantt-task-cell-label{display:table-cell;width:280px;min-width:280px;padding:8px 14px;font-size:12px;border-right:1px solid var(--border);border-bottom:1px solid rgba(216,208,196,.5);background:var(--surface);vertical-align:middle;}
.gantt-task-cell-bar{display:table-cell;border-bottom:1px solid rgba(216,208,196,.5);background:#FFFFFF;vertical-align:middle;padding:0;}
.g-task-owner{font-size:10px;color:var(--text-muted);}
/* Bar canvas inside cell */
.gantt-bar-canvas{position:relative;height:40px;}
.gantt-bar{position:absolute;height:22px;top:9px;border-radius:3px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:600;color:#FFFFFF;overflow:hidden;white-space:nowrap;cursor:pointer;transition:opacity .15s;min-width:6px;box-shadow:0 1px 3px rgba(0,0,0,.12);}
.gantt-bar:hover{opacity:.82;box-shadow:0 2px 6px rgba(0,0,0,.18);}
.gantt-bar span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;}
.gantt-today-vline{position:absolute;top:0;bottom:0;width:1px;background:#EE202E;opacity:.4;pointer-events:none;z-index:4;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:6px;width:560px;max-height:85vh;overflow-y:auto;animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:14px;font-weight:600;}
.modal-task-num{font-size:11px;color:var(--accent);font-family:'IBM Plex Mono',monospace;}
.btn-close{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .15s;}
.btn-close:hover{background:var(--surface2);color:var(--text);}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;font-family:'IBM Plex Mono',monospace;}
.form-input,.form-select,.form-textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;font-family:'Sarabun',sans-serif;font-size:13px;border-radius:3px;transition:border-color .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:72px;}
.subtasks-section{display:flex;flex-direction:column;gap:6px;}
.subtask-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:3px;}
.subtask-text{flex:1;font-size:12px;}
.btn-del-sub{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;transition:color .15s;}
.btn-del-sub:hover{color:var(--red);}
.subtask-add-row{display:flex;gap:8px;}
.subtask-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;font-family:'Sarabun',sans-serif;font-size:12px;border-radius:3px;}
.subtask-input:focus{outline:none;border-color:var(--accent);}
.btn-add-sub{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Sarabun',sans-serif;font-size:12px;border-radius:3px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn-add-sub:hover{border-color:var(--accent);color:var(--accent);}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--surface);}
.btn-cancel{padding:8px 16px;background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:'Sarabun',sans-serif;font-size:13px;border-radius:3px;cursor:pointer;transition:all .15s;}
.btn-cancel:hover{border-color:var(--text-muted);color:var(--text);}
.btn-save{padding:8px 20px;background:var(--accent);border:none;color:var(--bg);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;border-radius:3px;cursor:pointer;transition:background .15s;}
.btn-save:hover{background:#c9101c;}
.btn-delete{padding:8px 16px;background:transparent;border:1px solid rgba(224,92,92,.3);color:var(--red);font-family:'Sarabun',sans-serif;font-size:13px;border-radius:3px;cursor:pointer;transition:all .15s;margin-right:auto;}
.btn-delete:hover{background:rgba(224,92,92,.1);}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-dim);}
.empty-state .es-icon{font-size:36px;margin-bottom:12px;}
.empty-state .es-text{font-size:13px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim);}
/* EXPORT BUTTON */
.btn-export{display:flex;align-items:center;gap:6px;padding:8px 14px;background:transparent;color:var(--text-muted);border:1px solid var(--border);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:500;border-radius:3px;transition:all .15s;}
.btn-export:hover{border-color:var(--accent);color:var(--accent);}
.header-right{display:flex;align-items:center;gap:8px;}
/* PRINT / PDF — handled via JS window.open, not inline @media print */
@media print{
  body{background:#FFF!important;print-color-adjust:exact;-webkit-print-color-adjust:exact;}
  .header,.header-tabs,.btn-add,.btn-export,.btn-edit,.modal-overlay{display:none!important;}
  .view.active{display:block!important;}
  .gantt-outer{overflow:visible!important;}
  .gantt-sticky-hdr{position:static!important;}
  .phase-group{page-break-inside:avoid;}
  .gantt-task-row{page-break-inside:avoid;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-mark">UW</div>
    <div>
      <span class="app-title">Event Checklist</span>
      <span class="app-sub"> · Union Wealth</span>
    </div>
  </div>
  <div class="header-tabs">
    <button class="tab-btn active" id="tab-checklist" onclick="switchView('checklist',this)">☰ Checklist</button>
    <button class="tab-btn" id="tab-gantt" onclick="switchView('gantt',this)">▦ Gantt Chart</button>
  </div>
  <div class="header-right">
    <button class="btn-export" onclick="exportPDF()" title="Export หน้าปัจจุบันเป็น PDF">⬇ Export PDF</button>
    <button class="btn-add" onclick="openModal(null)">＋ เพิ่ม Task</button>
  </div>
</div>

<div id="view-checklist" class="view active">
  <div class="checklist-container">
    <div class="stats-bar">
      <div class="stat-item s-total"><div class="stat-num" id="st-total">0</div><div class="stat-label">Tasks ทั้งหมด</div></div>
      <div class="stat-item s-done"><div class="stat-num" id="st-done">0</div><div class="stat-label">เสร็จแล้ว</div></div>
      <div class="stat-item s-prog"><div class="stat-num" id="st-prog">0</div><div class="stat-label">กำลังทำ</div></div>
      <div class="stat-item s-todo"><div class="stat-num" id="st-todo">0</div><div class="stat-label">ยังไม่เริ่ม</div></div>
      <div class="stat-item s-over"><div class="stat-num" id="st-over">0</div><div class="stat-label">เกินกำหนด</div></div>
    </div>
    <div class="filter-bar">
      <span class="filter-label">FILTER:</span>
      <select class="filter-select" id="filter-phase" onchange="renderChecklist()">
        <option value="">Phase ทั้งหมด</option>
      </select>
      <select class="filter-select" id="filter-owner" onchange="renderChecklist()">
        <option value="">Owner ทั้งหมด</option>
      </select>
      <select class="filter-select" id="filter-status" onchange="renderChecklist()">
        <option value="">Status ทั้งหมด</option>
        <option value="To Do">To Do</option>
        <option value="In Progress">In Progress</option>
        <option value="Done">Done</option>
        <option value="Overdue">Overdue</option>
      </select>
    </div>
    <div id="checklist-body"></div>
  </div>
</div>

<div id="view-gantt" class="view">
  <!-- Sticky header: outside overflow container so position:sticky works against viewport -->
  <div class="gantt-sticky-hdr" id="gantt-sticky-hdr">
    <div class="gantt-sticky-label">งาน / Task</div>
    <div class="gantt-sticky-timeline" id="gantt-sticky-timeline"></div>
  </div>
  <!-- Scrollable body only -->
  <div class="gantt-outer" id="gantt-outer">
    <div id="gantt-wrap"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-task-num" id="modal-task-num">NEW TASK</div>
        <div class="modal-title" id="modal-title-text">สร้าง Task ใหม่</div>
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group full">
        <label class="form-label">ชื่องาน *</label>
        <input type="text" class="form-input" id="f-name" placeholder="ระบุชื่องาน...">
      </div>
      <div class="form-group">
        <label class="form-label">รายละเอียด</label>
        <textarea class="form-textarea" id="f-detail" placeholder="รายละเอียดงาน / หมายเหตุ..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phase *</label>
          <select class="form-select" id="f-phase">
            <option value="">เลือก Phase...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ผู้รับผิดชอบ</label>
          <input type="text" class="form-input" id="f-owner" placeholder="เช่น Marketing, HR, FP...">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">วันเริ่ม *</label>
          <input type="date" class="form-input" id="f-start">
        </div>
        <div class="form-group">
          <label class="form-label">วันสิ้นสุด *</label>
          <input type="date" class="form-input" id="f-end">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="f-status">
            <option value="To Do">To Do</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Progress (%)</label>
          <input type="number" class="form-input" id="f-progress" min="0" max="100" value="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Risk / Dependencies</label>
        <textarea class="form-textarea" id="f-risk" placeholder="ข้อควรระวัง / สิ่งที่ต้องรอ..." style="min-height:52px"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Link / URL</label>
        <input type="text" class="form-input" id="f-link" placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="form-label">Checklist / Subtasks</label>
        <div class="subtasks-section">
          <div id="subtasks-list"></div>
          <div class="subtask-add-row">
            <input type="text" class="subtask-input" id="subtask-input" placeholder="เพิ่ม Subtask...">
            <button class="btn-add-sub" onclick="addSubtask()">+ เพิ่ม</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="btn-delete" onclick="deleteTask()" style="display:none">🗑 ลบ</button>
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>

function genId(){return 'T'+Date.now().toString().slice(-6);}

function getStatus(task){
  if(task.status==='Done')return 'Done';
  const today=new Date();today.setHours(0,0,0,0);
  const end=new Date(task.end);end.setHours(0,0,0,0);
  if(end<today&&task.status!=='Done')return 'Overdue';
  return task.status;
}

function getPhase(id){return PHASES.find(p=>p.id===id)||{name:id,color:'#888'};}

function fmtDate(d){
  if(!d)return '—';

}

function toggleDone(id){

function quickDelete(id){

// ===== DATE UTILS (fix timezone bug) =====
// Parse "YYYY-MM-DD" as LOCAL date — avoids UTC midnight offset in non-UTC timezones
function parseLocalDate(str){
  if(!str)return null;
  const [y,m,d]=str.split('-').map(Number);
  return new Date(y,m-1,d);
}
function dateKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayKey(){ return dateKey(new Date()); }

// ===== GANTT =====
function renderGantt(){
  const wrap=document.getElementById('gantt-wrap');
  if(tasks.length===0){
    wrap.innerHTML='<div class="empty-state"><div class="es-icon">📊</div><div class="es-text">ยังไม่มี task</div></div>';
    return;
  }

  // Build day range
  const allLocalDates=tasks.flatMap(t=>[parseLocalDate(t.start),parseLocalDate(t.end)]).filter(d=>d&&!isNaN(d));
  if(allLocalDates.length===0)return;
  let minD=new Date(Math.min(...allLocalDates));
  let maxD=new Date(Math.max(...allLocalDates));
  minD.setDate(minD.getDate()-3);
  maxD.setDate(maxD.getDate()+5);

  const days=[];
  const dayKeyMap={}; // "YYYY-MM-DD" -> col index
  let cur=new Date(minD);
  while(cur<=maxD){
    const dk=dateKey(cur);
    dayKeyMap[dk]=days.length;
    days.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }

  const DW=28; // px per day column
  const LABEL_W=280;
  const totalW=days.length*DW;
  const tkToday=todayKey();
  const todayIdx=dayKeyMap[tkToday]??-1;
  const todayX=todayIdx>=0?todayIdx*DW+Math.floor(DW/2):-1;

  // Build month header blocks
  const months={};
  days.forEach((d,i)=>{
    const k=`${d.getFullYear()}-${d.getMonth()}`;
    if(!months[k])months[k]={label:d.toLocaleDateString('th-TH',{month:'long',year:'numeric'}),start:i,count:0};
    months[k].count++;
  });

  // Header: month + day row
  let monthHtml='';
  Object.values(months).forEach(m=>{
    let daysCells='';
    for(let i=0;i<m.count;i++){
      const d=days[m.start+i];
      const isT=dateKey(d)===tkToday;
      const isW=d.getDay()===0||d.getDay()===6;
      daysCells+=`<div class="gantt-day-cell ${isT?'today-col':''} ${isW?'weekend':''}">${d.getDate()}</div>`;
    }
    monthHtml+=`<div class="gantt-month-block" style="width:${m.count*DW}px">
      <span class="gantt-month-lbl">${m.label}</span>
      <div class="gantt-days-row">${daysCells}</div>
    </div>`;
  });

  // Group tasks by phase
  const grouped={};
  PHASES.forEach(p=>{grouped[p.id]=[];});
  tasks.forEach(t=>{if(!grouped[t.phase])grouped[t.phase]=[];grouped[t.phase].push(t);});

  // Today vline HTML snippet (reused per bar canvas)
  const todayVline=todayX>=0
    ?`<div class="gantt-today-vline" style="left:${todayX}px"></div>`
    :'';

  // Build table rows HTML
  let rowsHtml='';
  PHASES.forEach(phase=>{
    const pT=grouped[phase.id]||[];
    if(pT.length===0)return;

    // Phase header row
    rowsHtml+=`<div class="gantt-phase-row" style="display:table-row">
      <div class="gantt-phase-cell-label" style="display:table-cell">
        <span style="display:inline-flex;align-items:center;gap:7px;color:${phase.color}">
          <span style="width:7px;height:7px;border-radius:50%;background:${phase.color};display:inline-block;flex-shrink:0"></span>
          ${phase.name}
        </span>
      </div>
      <div class="gantt-phase-cell-bar" style="display:table-cell">
        <div class="gantt-bar-canvas" style="width:${totalW}px">${todayVline}</div>
      </div>
    </div>`;

    // Task rows
    pT.forEach(task=>{
      const si=dayKeyMap[task.start]??-1;
      const ei=dayKeyMap[task.end]??-1;
      const left=(si>=0?si:0)*DW;
      const right=(ei>=0?(ei+1):si>=0?si+1:1)*DW;
      const width=Math.max(right-left,8);

      // Color logic: phase color always, shade by status
      let bc=phase.color;
      const st=getStatus(task);
      if(st==='Done')bc='#2E7D52';
      else if(st==='Overdue')bc='#9A1220';
      // In Progress & To Do both use phase color (To Do slightly muted)
      else if(st==='To Do')bc=phase.color+'CC'; // 80% opacity via hex

      const labelText=width>44?`<span style="max-width:${width-14}px">${task.name}</span>`:'';

      rowsHtml+=`<div class="gantt-task-row" style="display:table-row">
        <div class="gantt-task-cell-label" style="display:table-cell">
          <div style="font-size:12px;font-weight:500;line-height:1.3">${task.name}</div>
          <div class="g-task-owner">${task.owner||''}</div>
        </div>
        <div class="gantt-task-cell-bar" style="display:table-cell">
          <div class="gantt-bar-canvas" style="width:${totalW}px">
            ${todayVline}
            <div class="gantt-bar"
              style="left:${left}px;width:${width}px;background:${bc}"
              title="${task.name}&#10;เริ่ม: ${task.start}&#10;สิ้นสุด: ${task.end}&#10;Status: ${st}&#10;Owner: ${task.owner||'—'}"
              onclick="openModal('${task.id}')">
              ${labelText}
            </div>
          </div>
        </div>
      </div>`;
    });
  });

  // Assemble: sticky header gets month HTML, body table gets rows only
  const stickyTimeline=document.getElementById('gantt-sticky-timeline');
  if(stickyTimeline) stickyTimeline.innerHTML=`<div class="gantt-month-row" id="gantt-month-row-inner">${monthHtml}</div>`;

  wrap.innerHTML=`<div class="gantt-table" style="display:table;border-collapse:collapse;width:100%">
    <div style="display:table-row-group">${rowsHtml}</div>
  </div>`;

  // Sync horizontal scroll: when outer body scrolls, shift the sticky timeline inner div
  const outer=document.getElementById('gantt-outer');
  if(outer){
    // Remove previous listener cleanly
    if(outer._syncScroll){ outer.removeEventListener('scroll',outer._syncScroll); }
    outer._syncScroll=function(){
      const inner=document.getElementById('gantt-month-row-inner');
      if(inner) inner.style.transform=`translateX(-${outer.scrollLeft}px)`;
    };
    outer.addEventListener('scroll',outer._syncScroll,{passive:true});
    // Auto-scroll to today — fire after paint so scrollLeft takes effect
    if(todayX>0){
      requestAnimationFrame(()=>{
        outer.scrollLeft=Math.max(0,todayX-320);
      });
    }
  }
}

      @media print{body{padding:0;}}
      table{width:100%;border-collapse:collapse;}
      th{background:#F7F3EC;padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6B6B6B;border-bottom:2px solid #D8D0C4;text-align:left;font-family:monospace;}
      tr:hover{background:#F7F3EC;}
    </style></head><body>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #EE202E">
      <div>
        <div style="font-size:18px;font-weight:700;color:#434345">Event Checklist</div>
        <div style="font-size:12px;color:#6B6B6B;margin-top:2px">Union Wealth · พิมพ์: ${dateStr}</div>
      </div>
      <div style="text-align:right;font-size:11px;color:#6B6B6B">
        Tasks ทั้งหมด: <strong>${tasks.length}</strong> &nbsp;|&nbsp; เสร็จแล้ว: <strong style="color:#2E7D52">${done}</strong> &nbsp;|&nbsp; คงเหลือ: <strong>${tasks.length-done}</strong>
      </div>
    </div>
    <table>
      <thead><tr>
        <th style="width:32%">งาน</th><th style="width:10%">Owner</th>
        <th style="width:9%">เริ่ม</th><th style="width:9%">สิ้นสุด</th>
        <th style="width:10%">Status</th><th style="width:10%">Progress</th>
        <th>Risk / หมายเหตุ</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <script>window.onload=function(){window.print();}<\/script>
    </body></html>`;

    const w=window.open('','_blank','width=900,height=700');
    w.document.write(html);
    w.document.close();

  } else {
    // LANDSCAPE — gantt chart as SVG-style HTML
    // Rebuild gantt data
    const allLocalDates=tasks.flatMap(t=>[parseLocalDate(t.start),parseLocalDate(t.end)]).filter(d=>d&&!isNaN(d));
    if(allLocalDates.length===0){alert('ไม่มีข้อมูลวันที่');return;}
    let minD=new Date(Math.min(...allLocalDates));
    let maxD=new Date(Math.max(...allLocalDates));
    minD.setDate(minD.getDate()-2);maxD.setDate(maxD.getDate()+4);
    const days=[];const dkMap={};let cur=new Date(minD);
    while(cur<=maxD){dkMap[dateKey(cur)]=days.length;days.push(new Date(cur));cur.setDate(cur.getDate()+1);}

    const DW=22; // slightly narrower for print
    const LW=200; // label col
    const ROW_H=28;
    const HDR_H=44;
    const tkToday=todayKey();
    const totalW=days.length*DW;

    // Month header
    const months={};
    days.forEach((d,i)=>{
      const k=`${d.getFullYear()}-${d.getMonth()}`;
      if(!months[k])months[k]={label:d.toLocaleDateString('th-TH',{month:'long',year:'numeric'}),start:i,count:0};
      months[k].count++;
    });

    let mHdr='';
    Object.values(months).forEach(m=>{
      mHdr+=`<div style="display:inline-block;width:${m.count*DW}px;vertical-align:top;border-right:1px solid #D8D0C4">
        <div style="padding:3px 6px;font-size:10px;font-weight:600;color:#EE202E;border-bottom:1px solid #D8D0C4;font-family:monospace">${m.label}</div>
        <div style="display:flex">`;
      for(let i=0;i<m.count;i++){
        const d=days[m.start+i];
        const isT=dateKey(d)===tkToday;
        const isW=d.getDay()===0||d.getDay()===6;
        mHdr+=`<div style="width:${DW}px;flex-shrink:0;font-size:8px;color:${isT?'#EE202E':'#8A8D93'};font-weight:${isT?700:400};text-align:center;padding:2px 0;border-right:1px solid rgba(216,208,196,.5);background:${isW?'rgba(230,224,214,.3)':'transparent'}">${d.getDate()}</div>`;
      }
      mHdr+=`</div></div>`;
    });

    // Task rows
    const grouped2={};PHASES.forEach(p=>{grouped2[p.id]=[];});
    tasks.forEach(t=>{if(!grouped2[t.phase])grouped2[t.phase]=[];grouped2[t.phase].push(t);});

    let bodyRows='';
    const todayX2=(dkMap[tkToday]??-1)>=0?(dkMap[tkToday]*DW+DW/2):-1;

    PHASES.forEach(phase=>{
      const pT=grouped2[phase.id]||[];
      if(pT.length===0)return;
      bodyRows+=`<div style="display:flex;background:${phase.color}08;border-bottom:1px solid #D8D0C4">
        <div style="width:${LW}px;flex-shrink:0;padding:4px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:${phase.color};border-right:1px solid #D8D0C4;display:flex;align-items:center;gap:5px">
          <span style="width:5px;height:5px;border-radius:50%;background:${phase.color};display:inline-block;flex-shrink:0"></span>${phase.name}
        </div>
        <div style="width:${totalW}px;flex-shrink:0;position:relative;height:22px">
          ${todayX2>=0?`<div style="position:absolute;left:${todayX2}px;top:0;bottom:0;width:1px;background:#EE202E;opacity:.3"></div>`:''}
        </div>
      </div>`;
      pT.forEach(task=>{
        const si=dkMap[task.start]??-1;const ei=dkMap[task.end]??-1;
        const left=(si>=0?si:0)*DW;const right=(ei>=0?(ei+1):(si>=0?si+1:1))*DW;
        const w2=Math.max(right-left,6);
        const st=getStatus(task);
        let bc2=phase.color;
        if(st==='Done')bc2='#2E7D52';
        else if(st==='Overdue')bc2='#9A1220';
        bodyRows+=`<div style="display:flex;border-bottom:1px solid rgba(216,208,196,.4)">
          <div style="width:${LW}px;flex-shrink:0;padding:4px 10px;border-right:1px solid #D8D0C4;background:#F7F3EC">
            <div style="font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${LW-20}px">${task.name}</div>
            <div style="font-size:9px;color:#6B6B6B">${task.owner||''}</div>
          </div>
          <div style="width:${totalW}px;flex-shrink:0;position:relative;height:${ROW_H}px">
            ${todayX2>=0?`<div style="position:absolute;left:${todayX2}px;top:0;bottom:0;width:1px;background:#EE202E;opacity:.3"></div>`:''}
            <div style="position:absolute;left:${left}px;width:${w2}px;height:16px;top:6px;background:${bc2};border-radius:2px;display:flex;align-items:center;padding:0 4px;overflow:hidden">
              ${w2>40?`<span style="font-size:8px;font-weight:600;color:#FFF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${w2-8}px">${task.name}</span>`:''}
            </div>
          </div>
        </div>`;
      });
    });

    const html2=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>UW Gantt Chart</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap');
      *{margin:0;padding:0;box-sizing:border-box;}
      body{font-family:'Sarabun',sans-serif;background:#FFF;color:#434345;}
      @page{size:A3 landscape;margin:10mm;}
      @media print{body{padding:0;}.no-print{display:none!important;}}
    </style></head><body>
    <div style="padding:12px 16px;border-bottom:2px solid #EE202E;display:flex;justify-content:space-between;align-items:center;margin-bottom:0">
      <div><span style="font-size:16px;font-weight:700">Event Gantt Chart</span> <span style="font-size:11px;color:#6B6B6B;margin-left:8px">Union Wealth · ${dateStr}</span></div>
      <div style="font-size:10px;color:#8A8D93;font-family:monospace">Total: ${tasks.length} tasks</div>
    </div>
    <div style="display:flex;border-bottom:2px solid #D8D0C4;background:#F7F3EC;position:sticky;top:0">
      <div style="width:${LW}px;flex-shrink:0;padding:5px 10px;font-size:10px;color:#8A8D93;border-right:1px solid #D8D0C4;font-family:monospace">งาน / Task</div>
      <div style="overflow:hidden">${mHdr}</div>
    </div>
    <div>${bodyRows}</div>
    <script>window.onload=function(){window.print();}<\/script>
    </body></html>`;

    const w2=window.open('','_blank','width=1200,height=800');
    w2.document.write(html2);
    w2.document.close();
  }
}

// ===== MODAL =====
function openModal(id){
  editingId=id;currentSubtasks=[];
  populateSelects();
  const btn=document.getElementById('btn-delete');
  if(id){
    const task=tasks.find(t=>t.id===id);
    document.getElementById('modal-task-num').textContent=task.id;
    document.getElementById('modal-title-text').textContent='แก้ไข Task';
    document.getElementById('f-name').value=task.name;
    document.getElementById('f-detail').value=task.detail||'';
    document.getElementById('f-phase').value=task.phase;
    document.getElementById('f-owner').value=task.owner||'';
    document.getElementById('f-start').value=task.start;
    document.getElementById('f-end').value=task.end;
    document.getElementById('f-status').value=task.status;
    document.getElementById('f-progress').value=task.progress;
    document.getElementById('f-risk').value=task.risk||'';
    document.getElementById('f-link').value=task.link||'';
    currentSubtasks=JSON.parse(JSON.stringify(task.subtasks||[]));
    btn.style.display='block';
  } else {
    document.getElementById('modal-task-num').textContent='NEW TASK';
    document.getElementById('modal-title-text').textContent='สร้าง Task ใหม่';
    document.getElementById('f-name').value='';
    document.getElementById('f-detail').value='';
    document.getElementById('f-phase').value='';
    document.getElementById('f-owner').value='';
    const td=new Date().toISOString().slice(0,10);
    document.getElementById('f-start').value=td;
    document.getElementById('f-end').value=td;
    document.getElementById('f-status').value='To Do';
    document.getElementById('f-progress').value=0;
    document.getElementById('f-risk').value='';
    document.getElementById('f-link').value='';
    btn.style.display='none';
  }
  renderSubtasks();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  editingId=null;
}

function renderSubtasks(){
  const list=document.getElementById('subtasks-list');
  if(currentSubtasks.length===0){list.innerHTML=`<div style="font-size:11px;color:var(--text-dim);padding:4px 0">ยังไม่มี Subtask</div>`;return;}
  list.innerHTML=currentSubtasks.map((s,i)=>`
    <div class="subtask-item">
      <input type="checkbox" ${s.done?'checked':''} onchange="toggleSub(${i})">
      <span class="subtask-text" style="${s.done?'text-decoration:line-through;color:var(--text-dim)':''}">${s.text}</span>
      <button class="btn-del-sub" onclick="deleteSub(${i})">✕</button>
    </div>`).join('');
}

function toggleSub(i){currentSubtasks[i].done=!currentSubtasks[i].done;renderSubtasks();}
function deleteSub(i){currentSubtasks.splice(i,1);renderSubtasks();}
function addSubtask(){
  const inp=document.getElementById('subtask-input');
  if(!inp.value.trim())return;
  currentSubtasks.push({text:inp.value.trim(),done:false});
  inp.value='';renderSubtasks();
}
document.getElementById('subtask-input').addEventListener('keydown',e=>{if(e.key==='Enter')addSubtask();});

function saveTask(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('กรุณาระบุชื่องาน');return;}
  const phase=document.getElementById('f-phase').value;
  if(!phase){alert('กรุณาเลือก Phase');return;}
  const data={
    name,
    detail:document.getElementById('f-detail').value,
    phase,
    owner:document.getElementById('f-owner').value,
    start:document.getElementById('f-start').value,
    end:document.getElementById('f-end').value,
    status:document.getElementById('f-status').value,
    progress:parseInt(document.getElementById('f-progress').value)||0,
    risk:document.getElementById('f-risk').value,
    link:document.getElementById('f-link').value,
    subtasks:currentSubtasks,
  };
  if(editingId){
    const i=tasks.findIndex(t=>t.id===editingId);
    tasks[i]={...tasks[i],...data};
  } else {
    tasks.push({id:genId(),...data});
  }
  save();closeModal();renderChecklist();
}

function deleteTask(){
  if(!editingId)return;
  if(!confirm('ต้องการลบ Task นี้?'))return;
  tasks=tasks.filter(t=>t.id!==editingId);
  save();closeModal();renderChecklist();
}

document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

renderChecklist();
</script>
</body>
